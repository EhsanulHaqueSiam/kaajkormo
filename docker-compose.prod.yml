services:
  # ─── Frontend (Nginx + SPA) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""  # Empty = same origin, nginx proxies /api to backend
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    container_name: kaajkormo-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kaajkormo

  # ─── Backend (Rust API) ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: kaajkormo-backend
    environment:
      DATABASE_URL: postgres://${DB_USER:-kaajkormo}:${DB_PASSWORD:-kaajkormo}@postgres:5432/${DB_NAME:-kaajkormo}
      CLERK_ISSUER: ${CLERK_ISSUER}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info}
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - kaajkormo

  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: kaajkormo-db
    environment:
      POSTGRES_USER: ${DB_USER:-kaajkormo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kaajkormo}
      POSTGRES_DB: ${DB_NAME:-kaajkormo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kaajkormo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kaajkormo

  # ─── Redis (optional, comment out if not needed) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: kaajkormo-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - kaajkormo

  # ─── Meilisearch (optional, comment out if not needed) ───────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: kaajkormo-search
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterkey}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - searchdata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kaajkormo

volumes:
  pgdata:
  uploads:
  redisdata:
  searchdata:

networks:
  kaajkormo:
    driver: bridge
